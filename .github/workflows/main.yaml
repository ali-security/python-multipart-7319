name: Python package

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]


jobs:
  build:

    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: MatteoH2O1999/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --index-url 'https://:2024-02-10T13:32:02.969646Z@time-machines-pypi.sealsecurity.io/' --upgrade pip
          pip install --index-url 'https://:2024-02-10T13:32:02.969646Z@time-machines-pypi.sealsecurity.io/' .[dev]
      - name: Lint
        if: matrix.python-version == '3.8'
        run: |
          ruff multipart tests
      - name: Test with pytest
        run: |
          inv test
